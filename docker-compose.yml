services:
  postgres:
    image: postgres:16-alpine
    container_name: flash_sale_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flashsale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashsale_secret}
      POSTGRES_DB: ${POSTGRES_DB:-flash_sale_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flashsale}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flash_sale_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: